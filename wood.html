<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wood — mbcarmo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #000;
            background: #fff;
            font-size: 14px;
        }

        header {
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e8e8e8;
            margin-bottom: 40px;
        }

        .back-link {
            color: #aaa;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }

        .back-link:hover { color: #000; }

        .page-title {
            font-size: 15px;
            font-weight: 700;
        }

        main {
            padding: 0 40px 80px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .gallery-item {
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: opacity 0.2s;
        }

        .gallery-item:hover img { opacity: 0.82; }

        .gallery-item-label {
            margin-top: 8px;
            font-size: 13px;
            color: #aaa;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .lightbox.active { display: flex; }

        .lightbox img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 28px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .lightbox-close:hover { opacity: 0.7; }

        @media (max-width: 700px) {
            header { padding: 20px 24px; }
            main { padding: 0 24px 60px; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← work</a>
        <span class="page-title">wood</span>
    </header>

    <main>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="samples/wood/dryfit.jpeg" alt="dryfit">
                <div class="gallery-item-label">dryfit</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="samples/wood/glueup.jpeg" alt="glueup">
                <div class="gallery-item-label">glueup</div>
            </div>
            <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
                <img src="samples/wood/chamfer.jpeg" alt="chamfer">
                <div class="gallery-item-label">chamfer</div>
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
